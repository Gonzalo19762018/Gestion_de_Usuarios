worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript text/javascript application/json;

  # map debe estar en el bloque http, no en server
  map $sent_http_content_type $csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'";
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — se repiten en cada location porque nginx no los hereda
    # cuando el location tiene su propio add_header

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   $csp                                  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # HTML: always revalidate so users get updated app versions
    location ~* \.html$ {
      expires -1;
      add_header Cache-Control            "no-cache, must-revalidate"               always;
      add_header X-Frame-Options          "SAMEORIGIN"                              always;
      add_header X-Content-Type-Options   "nosniff"                                 always;
      add_header Referrer-Policy          "strict-origin-when-cross-origin"         always;
      add_header X-XSS-Protection         "1; mode=block"                           always;
      add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
      add_header Content-Security-Policy  $csp                                      always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"    always;
      etag on;
    }

    # Cache static assets (CSS/JS already versioned via ?v= query strings)
    location ~* \.(css|js)$ {
      expires -1;
      add_header Cache-Control            "no-store, no-cache, must-revalidate"     always;
      add_header Pragma                   "no-cache"                                always;
      add_header CDN-Cache-Control        "no-store"                                always;
      add_header Cloudflare-CDN-Cache-Control "no-store"                            always;
      add_header X-Frame-Options          "SAMEORIGIN"                              always;
      add_header X-Content-Type-Options   "nosniff"                                 always;
      add_header Referrer-Policy          "strict-origin-when-cross-origin"         always;
      add_header X-XSS-Protection         "1; mode=block"                           always;
      add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
      add_header Content-Security-Policy  $csp                                      always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"    always;
      etag on;
    }

    # API proxy
    location /api/ {
      proxy_pass         http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   Connection '';
      proxy_buffering    off;
      proxy_cache        off;
      add_header Cache-Control            "no-store, no-cache, must-revalidate"     always;
      add_header Pragma                   "no-cache"                                always;
      add_header X-Frame-Options          "SAMEORIGIN"                              always;
      add_header X-Content-Type-Options   "nosniff"                                 always;
      add_header Referrer-Policy          "strict-origin-when-cross-origin"         always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"    always;
    }

    # SPA fallback (hereda headers del server block)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
